name: macOS CI
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  macos-no-deps:
    name: macOS - No Optional Dependencies
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          CC: clang
          CXX: clang++
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release PAGMO_BUILD_TESTS=ON build
      - name: Test
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release test

  macos-eigen3:
    name: macOS - With Eigen3
    runs-on: macos-latest
    needs: macos-no-deps
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          CC: clang
          CXX: clang++
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release PAGMO_BUILD_TESTS=ON PAGMO_WITH_EIGEN3=ON build
      - name: Test
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release test

  macos-nlopt:
    name: macOS - With NLopt
    runs-on: macos-latest
    needs: macos-no-deps
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          CC: clang
          CXX: clang++
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release PAGMO_BUILD_TESTS=ON PAGMO_WITH_NLOPT=ON build
      - name: Test
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) BUILD_TYPE=Release test

  macos-all-deps:
    name: macOS - All Dependencies
    runs-on: macos-latest
    needs: [macos-eigen3, macos-nlopt, macos-ipopt]
    steps:
      - uses: actions/checkout@v4
      - name: Install ipopt build dependencies
        run: brew install gcc
      - name: Build and Test
        env:
          CC: clang
          CXX: clang++
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) full-test

  macos-conda:
    name: macOS - Conda Environment (All Dependencies)
    runs-on: macos-latest
    needs: macos-all-deps
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.9"
          channels: conda-forge
          channel-priority: strict
      - name: Install build dependencies
        shell: bash -el {0}
        run: conda install cmake gfortran compilers
      - name: Build and Test
        shell: bash -el {0}
        run: make CMAKE=cmake NUM_JOBS=$(sysctl -n hw.ncpu) full-test
